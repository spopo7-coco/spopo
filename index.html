<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NetProfite Pro | الصرامة الزمنية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0f172a; --gold: #f59e0b; --sidebar: #1e293b; --green: #10b981; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { background: var(--blue); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* تحسين شكل الماوس */
        button, .nav-link, .card, select { cursor: pointer !important; }
        input { cursor: text !important; user-select: text !important; }

        #login-screen { background: radial-gradient(circle, #1e293b, #0f172a); height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; position: fixed; z-index: 9999; }
        .login-card { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; color: #333; }

        #main-app { display: none; flex-direction: column; height: 100vh; }
        .content { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 90px; }
        .page { display: none; } .active { display: block; }

        .header { background: var(--sidebar); padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); }
        
        /* منطقة العداد والمزرعة */
        .timer-display { background: #000; color: var(--gold); padding: 10px; border-radius: 10px; font-size: 22px; font-weight: 900; text-align: center; border: 1px solid var(--gold); margin-bottom: 15px; letter-spacing: 2px; }
        .plot { width: 150px; height: 150px; background: #3d2b1f; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 60px; border: 4px solid var(--gold); box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        .btn-main { background: var(--gold); color: var(--blue); border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-main:disabled { opacity: 0.2; cursor: not-allowed !important; }

        .log-item { background: var(--sidebar); padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 12px; border-right: 3px solid var(--gold); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--sidebar); display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid #444; }
        .nav-link { padding: 12px 0; text-align: center; font-size: 10px; color: #94a3b8; }
        .nav-link.active { color: var(--gold); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; font-family: 'Cairo'; }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>

<div id="login-screen">
    <div class="login-card">
        <h3>NET PROFITE LOGIN</h3>
        <form onsubmit="return startApp(event)">
            <input type="text" id="uName" placeholder="الاسم الكامل" required>
            <input type="email" id="uEmail" placeholder="البريد الإلكتروني" required>
            <select id="uCountry">
                <option value="MA" data-curr="MAD">المغرب 🇲🇦</option>
                <option value="SA" data-curr="SAR">السعودية 🇸🇦</option>
                <option value="EG" data-curr="EGP">مصر 🇪🇬</option>
                <option value="DZ" data-curr="DZD">الجزائر 🇩🇿</option>
            </select>
            <button type="submit" class="btn-main">دخول المزرعة</button>
        </form>
    </div>
</div>

<div id="main-app">
    <div class="header">
        <span id="topName">--</span>
        <b id="topBal" style="color:var(--gold)">0.00</b>
    </div>

    <div class="content">
        <div id="p-farm" class="page active">
            <div class="timer-display" id="mainTimer">00:00:00</div>
            <div style="text-align:center; color:var(--gold); font-weight:bold;" id="statusText">جاهز للبدء</div>
            <div class="plot" id="plotIcon">🕳️</div>
            <button class="btn-main" id="btnSeed" onclick="doSeed()">زرع البذور 🌱</button>
            <button class="btn-main" id="btnWater" onclick="doWater()" disabled>سقي المحصول 💧</button>
            <button class="btn-main" id="btnHarvest" onclick="doHarvest()" disabled style="background:var(--green); color:#white;">حصاد الأرباح 💰</button>
        </div>

        <div id="p-tasks" class="page">
            <h3>المهام اليومية</h3>
            <div class="log-item" onclick="completeTask(this, 10)">متابعة تلغرام <span style="float:left">+10</span></div>
            <div class="log-item" onclick="completeTask(this, 5)">مشاهدة إعلان <span style="float:left">+5</span></div>
        </div>

        <div id="p-dash" class="page">
            <h3>سجل الردود والعمليات</h3>
            <div id="logsContainer"></div>
        </div>

        <div id="p-pay" class="page">
            <h3>المحفظة</h3>
            <div style="background:var(--sidebar); padding:20px; border-radius:15px; text-align:center;">
                <small>رصيدك الحالي</small>
                <h2 id="payBal" style="color:var(--gold)">0.00</h2>
                <p style="font-size:11px;">الحد الأدنى للسحب 1500 وحدة</p>
                <button class="btn-main" onclick="alert('الرصيد غير كافٍ للسحب حالياً')">طلب سحب</button>
            </div>
        </div>

        <div id="p-profile" class="page">
            <h3>حسابي</h3>
            <div class="log-item">الاسم: <b id="pName"></b></div>
            <div class="log-item">البريد: <b id="pEmail"></b></div>
            <button class="btn-main" style="background:#ef4444; color:white;" onclick="location.reload()">خروج</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link active" onclick="nav('farm', this)"><span>🌱</span>المزرعة</div>
        <div class="nav-link" onclick="nav('tasks', this)"><span>✅</span>المهام</div>
        <div class="nav-link" onclick="nav('dash', this)"><span>📊</span>اللوحة</div>
        <div class="nav-link" onclick="nav('pay', this)"><span>💰</span>المال</div>
        <div class="nav-link" onclick="nav('profile', this)"><span>👤</span>حسابي</div>
    </div>
</div>

<script>
    let user = { bal: 0, curr: '' };
    let farmStage = 0; // 0:empty, 1:seeded, 2:watered, 3:ready
    let timerInt;

    function startApp(e) {
        e.preventDefault();
        const s = document.getElementById('uCountry');
        user.curr = s.options[s.selectedIndex].getAttribute('data-curr');
        document.getElementById('topName').innerText = document.getElementById('uName').value;
        document.getElementById('pName').innerText = document.getElementById('uName').value;
        document.getElementById('pEmail').innerText = document.getElementById('uEmail').value;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('bgMusic').play();
        addLog("دخول النظام", 0);
        updateUI();
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        el.classList.add('active');
    }

    // نظام الوقت الصارم
    function runTimer(seconds, nextAction) {
        clearInterval(timerInt);
        let remaining = seconds;
        const display = document.getElementById('mainTimer');
        
        // قفل جميع الأزرار أثناء الوقت
        document.getElementById('btnSeed').disabled = true;
        document.getElementById('btnWater').disabled = true;
        document.getElementById('btnHarvest').disabled = true;

        timerInt = setInterval(() => {
            remaining--;
            let h = Math.floor(remaining / 3600);
            let m = Math.floor((remaining % 3600) / 60);
            let s = remaining % 60;
            display.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

            if (remaining <= 0) {
                clearInterval(timerInt);
                display.innerText = "00:00:00";
                unlockNext(nextAction);
            }
        }, 1000);
    }

    function unlockNext(action) {
        if(action === 'water') {
            document.getElementById('btnWater').disabled = false;
            document.getElementById('statusText').innerText = "المحصول يحتاج سقي! 💧";
        } else if(action === 'harvest') {
            document.getElementById('btnHarvest').disabled = false;
            document.getElementById('statusText').innerText = "المحصول جاهز للحصاد! 💰";
            document.getElementById('plotIcon').innerText = "🌳";
        }
    }

    function doSeed() {
        farmStage = 1;
        document.getElementById('plotIcon').innerText = "🌱";
        document.getElementById('statusText').innerText = "ينمو... (المرحلة 1)";
        runTimer(10, 'water'); // تجربة: 10 ثوانٍ (غيرها لـ 10800 لـ 3 ساعات)
    }

    function doWater() {
        farmStage = 2;
        document.getElementById('plotIcon').innerText = "🌿";
        document.getElementById('statusText').innerText = "ينضج... (المرحلة 2)";
        runTimer(15, 'harvest'); // تجربة: 15 ثانية (غيرها لـ 86400 لـ 24 ساعة)
    }

    function doHarvest() {
        user.bal += 25;
        addLog("حصاد محصول", 25);
        alert("تم الحصاد! +25 " + user.curr);
        resetFarm();
        updateUI();
    }

    function resetFarm() {
        farmStage = 0;
        document.getElementById('plotIcon').innerText = "🕳️";
        document.getElementById('statusText').innerText = "جاهز للزرع";
        document.getElementById('btnSeed').disabled = false;
        document.getElementById('btnWater').disabled = true;
        document.getElementById('btnHarvest').disabled = true;
        document.getElementById('mainTimer').innerText = "00:00:00";
    }

    function completeTask(el, r) {
        user.bal += r;
        addLog("مهمة مكتملة", r);
        el.style.display = 'none';
        updateUI();
    }

    function addLog(type, val) {
        const div = document.createElement('div');
        div.className = 'log-item';
        div.innerHTML = `${type} <span style="float:left; color:var(--green)">+${val}</span>`;
        document.getElementById('logsContainer').prepend(div);
    }

    function updateUI() {
        const v = user.bal.toFixed(2) + " " + user.curr;
        document.getElementById('topBal').innerText = v;
        document.getElementById('payBal').innerText = v;
    }
</script>
</body>
</html>
