<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NetProfite Pro | النسخة المعتمدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0f172a; --gold: #f59e0b; --sidebar: #1e293b; --green: #10b981; --red: #ef4444; --white: #f8fafc; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        body { background: var(--blue); color: var(--white); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        button, .nav-link, select { cursor: pointer !important; }
        input { cursor: text !important; user-select: text !important; }

        /* شاشة تسجيل الدخول */
        #login-screen { background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; position: fixed; z-index: 9999; }
        .login-card { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; color: #333; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        #main-app { display: none; flex-direction: column; height: 100vh; }
        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; animation: fadeIn 0.4s forwards; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { background: var(--sidebar); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
        .mute-btn { background: rgba(245,158,11,0.2); border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 10px; font-weight: bold; font-size: 12px; }

        .timer-box { background: #000; color: var(--gold); padding: 15px; border-radius: 15px; font-size: 30px; font-weight: 900; text-align: center; border: 1px solid var(--gold); margin-bottom: 15px; letter-spacing: 2px; }
        .plot { width: 160px; height: 160px; background: #3d2b1f; border: 6px solid var(--gold); border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 75px; box-shadow: 0 5px 20px rgba(0,0,0,0.4); }

        .btn-action { background: var(--gold); color: var(--blue); border: none; padding: 16px; border-radius: 14px; font-weight: 900; width: 100%; font-size: 16px; margin-top: 10px; transition: 0.2s; }
        .btn-action:disabled { opacity: 0.2; filter: grayscale(1); cursor: not-allowed !important; }

        .log-item { background: var(--sidebar); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 4px solid var(--gold); display: flex; justify-content: space-between; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--sidebar); display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-link { padding: 12px 0; text-align: center; font-size: 10px; color: #94a3b8; text-decoration: none; }
        .nav-link.active { color: var(--gold); }
        .nav-link span { display: block; font-size: 20px; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; font-family: 'Cairo'; }
    </style>
</head>
<body>

<audio id="bgMusic" loop preload="auto"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

<div id="login-screen">
    <div class="login-card">
        <h2 style="margin:0; color:var(--blue)">NET PROFITE</h2>
        <p style="font-size:12px; color:#666; margin-bottom:15px;">استثمر وقتك في الزراعة الرقمية</p>
        
        <form id="googleForm" action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSdfu9v_MizW2VpYhW3e8r_X9I7v9E6Zq4vP6YI0ZpI7A8G7_Q/formResponse" method="post" target="hidden_iframe">
            <input type="text" name="entry.1954971449" id="userName" placeholder="الاسم الكامل" required>
            <input type="email" name="entry.2124666075" id="userEmail" placeholder="البريد الإلكتروني" required>
            
            <input type="hidden" name="entry.1410046301" id="fieldCountry" value="">
            <input type="hidden" name="entry.589900374" id="fieldBalance" value="0.00">
            <input type="hidden" name="entry.1652417255" id="fieldDate" value="">

            <select id="userCountry" onchange="document.getElementById('fieldCountry').value = this.value">
                <option value="">اختر الدولة</option>
                <option value="MA" data-curr="MAD">المغرب 🇲🇦</option>
                <option value="SA" data-curr="SAR">السعودية 🇸🇦</option>
                <option value="DZ" data-curr="DZD">الجزائر 🇩🇿</option>
                <option value="EG" data-curr="EGP">مصر 🇪🇬</option>
            </select>
            
            <button type="button" onclick="startApp()" class="btn-action">دخول المزرعة</button>
        </form>
    </div>
</div>

<div id="main-app">
    <div class="header">
        <div>
            <span id="topName" style="font-weight: 700;">--</span>
            <div id="topBal" style="color:var(--gold); font-weight:900; font-size: 14px;">0.00</div>
        </div>
        <button class="mute-btn" id="muteBtn" onclick="toggleMute()">صوت: ON 🔊</button>
    </div>

    <div class="content-area">
        <div id="page-farm" class="page active">
            <div class="timer-box" id="timer">00:00:00</div>
            <div style="text-align:center; color:var(--gold); font-weight:bold; margin-bottom:10px;" id="status">جاهز للزرع 🌱</div>
            <div class="plot" id="icon">🕳️</div>
            
            <button class="btn-action" id="btn-seed" onclick="actionSeed()">زرع البذور 🌱</button>
            <button class="btn-action" id="btn-w1" onclick="actionW1()" disabled>سقي المرحلة 1 (3 ساعات) 💧</button>
            <button class="btn-action" id="btn-w2" onclick="actionW2()" disabled>سقي المرحلة 2 (5 ساعات) 💧</button>
            <button class="btn-action" id="btn-har" onclick="actionHar()" disabled style="background:var(--green); color:white;">حصاد الأرباح (12 ساعة) 💰</button>
        </div>

        <div id="page-logs" class="page">
            <h3>سجل النشاط 📊</h3>
            <div id="logsList"></div>
        </div>

        <div id="page-wallet" class="page">
            <h3>المحفظة 💰</h3>
            <div style="background:var(--sidebar); padding:25px; border-radius:20px; text-align:center;">
                <small>الرصيد الكلي</small>
                <h1 id="walletBal" style="color:var(--gold); margin:10px 0;">0.00</h1>
                <p style="font-size:12px; opacity:0.7;">الحد الأدنى للسحب هو 1500 وحدة</p>
                <button class="btn-action" style="background:#334155;">طلب سحب</button>
            </div>
        </div>

        <div id="page-profile" class="page">
            <h3>الملف الشخصي 👤</h3>
            <div style="background:var(--sidebar); padding:15px; border-radius:15px;">
                <p>المزارع: <b id="p-name">--</b></p>
                <p>البريد: <b id="p-email">--</b></p>
                <p>الدولة: <b id="p-country">--</b></p>
            </div>
            <button class="btn-action" style="background:var(--red); color:white;" onclick="location.reload()">خروج</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link active" onclick="showP('farm', this)"><span>🌱</span>المزرعة</div>
        <div class="nav-link" onclick="showP('logs', this)"><span>📊</span>السجل</div>
        <div class="nav-link" onclick="showP('wallet', this)"><span>💰</span>المال</div>
        <div class="nav-link" onclick="showP('profile', this)"><span>👤</span>حسابي</div>
    </div>
</div>

<script>
    let userData = { bal: 0, cur: '', isMuted: false };
    let timerIdx;

    function startApp() {
        const name = document.getElementById('userName').value;
        const email = document.getElementById('userEmail').value;
        const country = document.getElementById('userCountry').value;

        if(!name || !email || !country) { alert("أكمل البيانات أولاً"); return; }

        // تعبئة الحقول المخفية قبل الإرسال
        document.getElementById('fieldDate').value = new Date().toLocaleString('ar-EG');
        document.getElementById('fieldBalance').value = "0.00";
        
        // إرسال البيانات فوراً لـ Google
        document.getElementById('googleForm').submit();

        // إعداد الواجهة
        const sel = document.getElementById('userCountry');
        userData.cur = sel.options[sel.selectedIndex].getAttribute('data-curr');
        document.getElementById('topName').innerText = name;
        document.getElementById('p-name').innerText = name;
        document.getElementById('p-email').innerText = email;
        document.getElementById('p-country').innerText = country;

        // الدخول
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('bgMusic').play().catch(()=>{});
        
        addLog("بدء استثمار جديد", 0);
        updateUI();
    }

    function toggleMute() {
        const m = document.getElementById('bgMusic');
        const b = document.getElementById('muteBtn');
        userData.isMuted = !userData.isMuted;
        m.muted = userData.isMuted;
        b.innerText = userData.isMuted ? "صوت: OFF 🔇" : "صوت: ON 🔊";
    }

    function showP(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }

    function runClock(sec, nextId, msg) {
        clearInterval(timerIdx);
        let rem = sec;
        const box = document.getElementById('timer');
        const lbl = document.getElementById('status');
        lbl.innerText = msg;
        
        document.querySelectorAll('.btn-action').forEach(b => b.disabled = true);

        timerIdx = setInterval(() => {
            rem--;
            let h = Math.floor(rem/3600), m = Math.floor((rem%3600)/60), s = rem%60;
            box.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(rem <= 0) {
                clearInterval(timerIdx);
                box.innerText = "00:00:00";
                document.getElementById(nextId).disabled = false;
                lbl.innerText = "المرحلة التالية مادية!";
            }
        }, 1000);
    }

    function actionSeed() { document.getElementById('icon').innerText = "🌱"; runClock(10800, 'btn-w1', "نمو 1 (3 ساعات)"); }
    function actionW1() { document.getElementById('icon').innerText = "🌿"; runClock(18000, 'btn-w2', "نمو 2 (5 ساعات)"); }
    function actionW2() { document.getElementById('icon').innerText = "🌳"; runClock(43200, 'btn-har', "نضج (12 ساعة)"); }

    function actionHar() {
        userData.bal += 25;
        addLog("حصاد محصول", 25);
        alert("مبروك! +25 وحدة");
        resetMizra3a();
        updateUI();
    }

    function resetMizra3a() {
        document.getElementById('icon').innerText = "🕳️";
        document.getElementById('status').innerText = "جاهز للزرع";
        document.getElementById('btn-seed').disabled = false;
        document.getElementById('btn-w1').disabled = true;
        document.getElementById('btn-w2').disabled = true;
        document.getElementById('btn-har').disabled = true;
    }

    function addLog(t, v) {
        const d = document.createElement('div');
        d.className = 'log-item';
        d.innerHTML = `<span>${t}</span><b>+${v}</b>`;
        document.getElementById('logsList').prepend(d);
    }

    function updateUI() {
        const txt = userData.bal.toFixed(2) + " " + userData.cur;
        document.getElementById('topBal').innerText = txt;
        document.getElementById('walletBal').innerText = txt;
        // تحديث حقل الرصيد المخفي في حال تم إرسال بيانات لاحقة
        document.getElementById('fieldBalance').value = txt;
    }
</script>
</body>
</html>
