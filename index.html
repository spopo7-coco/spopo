<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NetProfite Farm Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0f172a; --gold: #f59e0b; --red: #ef4444; --green: #10b981; --sidebar: #1e293b; }
        body { background: var(--blue); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        
        /* شاشة الدخول */
        #login-screen { background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; position: fixed; z-index: 9999; }
        .login-card { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; color: #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-weight: bold; font-family: 'Cairo'; box-sizing: border-box; }

        /* اللوحة الرئيسية */
        #main-app { display: none; flex-direction: column; height: 100vh; }
        .top-bar { background: var(--sidebar); padding: 15px; display: flex; justify-content: space-around; border-bottom: 2px solid var(--gold); }
        .stat-box b { color: var(--gold); font-size: 16px; }

        /* منطقة المزرعة */
        .farm-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .plot { width: 180px; height: 180px; background: #3d2b1f; border: 4px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 80px; position: relative; }
        
        /* شريط الحالة والوقت */
        .timer-info { background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--gold); text-align: center; }
        #countdown { color: var(--gold); font-weight: 900; display: block; font-size: 20px; }

        /* الباقات VIP */
        .vip-bar { background: rgba(255,255,255,0.05); padding: 10px; display: flex; gap: 10px; overflow-x: auto; }
        .vip-item { min-width: 100px; background: var(--sidebar); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        .vip-item.active { border-color: var(--gold); background: rgba(245, 158, 11, 0.1); }

        /* التحكم السفلي */
        .mobile-nav { background: var(--sidebar); padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .nav-btn { background: rgba(255,255,255,0.05); padding: 12px 2px; border-radius: 12px; text-align: center; font-size: 11px; cursor: pointer; border: 1px solid transparent; }
        .nav-btn.active { background: var(--gold); color: var(--blue); font-weight: 900; }
        .nav-btn.disabled { opacity: 0.2; pointer-events: none; }
        .nav-btn.urgent { background: var(--red); animation: blink 1s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .mute-btn { position: absolute; top: 80px; left: 20px; z-index: 100; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<audio id="gameMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" type="audio/mpeg"></audio>

<div id="login-screen">
    <div class="login-card">
        <h2 style="margin:0;">NET PROFITE FARM</h2>
        <p style="font-size:12px;">المزرعة الرقمية لربح العملات</p>
        <form onsubmit="return startGame(event)">
            <input type="text" id="uname" placeholder="الاسم الكامل" required>
            <select id="ucountry">
                <option value="MA" data-curr="MAD">المغرب 🇲🇦</option>
                <option value="SA" data-curr="SAR">السعودية 🇸🇦</option>
                <option value="DZ" data-curr="DZD">الجزائر 🇩🇿</option>
                <option value="EG" data-curr="EGP">مصر 🇪🇬</option>
                <option value="AE" data-curr="AED">الإمارات 🇦🇪</option>
                <option value="IQ" data-curr="IQD">العراق 🇮🇶</option>
                </select>
            <button type="submit" style="background:var(--gold); color:var(--blue); border:none; padding:15px; width:100%; border-radius:10px; font-weight:900; cursor:pointer;">دخول المزرعة</button>
        </form>
    </div>
</div>

<div id="main-app">
    <div class="mute-btn" onclick="toggleMute()" id="mute-icon">🔊</div>
    <div class="top-bar">
        <div class="stat-box"><small>الرصيد</small><br><b id="balance">0.00</b> <span id="cur-sym"></span></div>
        <div class="stat-box"><small>كود الإحالة</small><br><b id="ref-code">--</b></div>
    </div>

    <div class="vip-bar">
        <div class="vip-item active">🥉 برونز<br><small>وقت عادي</small></div>
        <div class="vip-item" onclick="showPay('الفضية')">🥈 فضة<br><small>وقت -50%</small></div>
        <div class="vip-item" onclick="showPay('الذهبية')">🥇 ذهب<br><small>وقت -75%</small></div>
    </div>

    <div class="farm-area">
        <div class="timer-info">
            <small id="status-label">جاهز للزرع</small>
            <span id="countdown">00:00:00</span>
        </div>
        <div class="plot" id="plant-box">🕳️</div>
        <p id="spoil-warn" style="color:var(--red); font-weight:bold; display:none;">⚠️ المحصول بدأ يفسد! سمد الآن!</p>
    </div>

    <div class="mobile-nav">
        <div id="btn-plant" class="nav-btn active" onclick="handlePlant()">🌱<br>زرع</div>
        <div id="btn-water" class="nav-btn disabled" onclick="handleWater()">💧<br>سقي</div>
        <div id="btn-fertilize" class="nav-btn disabled" onclick="handleFertilize()">🧪<br>سماد</div>
        <div id="btn-harvest" class="nav-btn disabled" onclick="handleHarvest()">💰<br>حصاد</div>
    </div>
    
    <div style="background:var(--sidebar); padding:10px; text-align:center; font-size:12px;" onclick="showPay('السحب')">
        <span style="color:var(--gold)">⚡ ترقية الحساب لتقليص الوقت وتسريع الحصاد</span>
    </div>
</div>

<script>
    let stage = 0; // 0:empty, 1:planted, 2:watered1, 3:watered2, 4:ready
    let balance = 0;
    let isWithered = false;
    let timerInter;

    function startGame(e) {
        e.preventDefault();
        const sel = document.getElementById('ucountry');
        document.getElementById('cur-sym').innerText = sel.options[sel.selectedIndex].getAttribute('data-curr');
        document.getElementById('ref-code').innerText = "NP-" + sel.value + "-" + Math.floor(1000+Math.random()*9000);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('gameMusic').play();
    }

    function handlePlant() {
        stage = 1;
        document.getElementById('plant-box').innerText = "🌱";
        updateStatus("سقي (1) بعد 3 ساعات", "btn-water", "btn-plant");
        startTimer(10800); // 3 ساعات
    }

    function handleWater() {
        if(stage === 1) {
            stage = 2;
            document.getElementById('plant-box').innerText = "🌿";
            updateStatus("سقي (2) بعد 5 ساعات", "btn-water", "btn-water");
            startTimer(18000); // 5 ساعات
        } else if(stage === 2) {
            stage = 3;
            document.getElementById('plant-box').innerText = "🌳";
            updateStatus("حصاد بعد 24 ساعة", "btn-harvest", "btn-water");
            startTimer(86400); // 24 ساعة
        }
    }

    function handleFertilize() {
        isWithered = false;
        document.getElementById('spoil-warn').style.display = 'none';
        document.getElementById('btn-fertilize').classList.remove('urgent');
        alert("تم إنقاذ المحصول بالسماد!");
    }

    function handleHarvest() {
        let reward = isWithered ? 100 : 500;
        balance += reward;
        document.getElementById('balance').innerText = balance.toFixed(2);
        alert("تم الحصاد! استلمت " + reward);
        resetFarm();
    }

    function startTimer(sec) {
        clearInterval(timerInter);
        let t = sec;
        timerInter = setInterval(() => {
            t--;
            let h = Math.floor(t / 3600);
            let m = Math.floor((t % 3600) / 60);
            let s = t % 60;
            document.getElementById('countdown').innerText = `${h}:${m}:${s}`;
            
            if(t === 0) {
                clearInterval(timerInter);
                triggerSpoil();
            }
        }, 1000);
    }

    function triggerSpoil() {
        isWithered = true;
        document.getElementById('spoil-warn').style.display = 'block';
        document.getElementById('btn-fertilize').classList.replace('disabled', 'active');
        document.getElementById('btn-fertilize').classList.add('urgent');
        document.getElementById('plant-box').innerText = "🥀";
    }

    function updateStatus(label, enableId, disableId) {
        document.getElementById('status-label').innerText = label;
        document.getElementById(enableId).classList.replace('disabled', 'active');
        document.getElementById(disableId).classList.replace('active', 'disabled');
    }

    function resetFarm() {
        stage = 0; isWithered = false;
        document.getElementById('plant-box').innerText = "🕳️";
        document.getElementById('status-label').innerText = "جاهز للزرع";
        document.getElementById('btn-plant').className = "nav-btn active";
        document.getElementById('btn-water').className = "nav-btn disabled";
        document.getElementById('btn-harvest').className = "nav-btn disabled";
    }

    function showPay(type) {
        alert("لتفعيل باقة " + type + " وتقليص الوقت، يرجى إرسال 20 USDT لعنوان المحفظة وتزويدنا بلقطة الشاشة.");
    }

    function toggleMute() {
        const m = document.getElementById('gameMusic');
        m.muted = !m.muted;
        document.getElementById('mute-icon').innerText = m.muted ? "🔇" : "🔊";
    }
</script>
</body>
</html>
