<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أميرة قلبي بديعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Reem+Kufi:wght@500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #ffafbd, #ffc3a0);
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: #d63384;
        }

        /* حاوية الرسالة */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 45px;
            border-radius: 35px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            z-index: 10;
            border: 3px solid #fff;
            animation: fadeIn 2.5s ease-out;
        }

        h1 {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 2.8rem;
            margin-bottom: 15px;
            color: #ff4d6d;
        }

        .recipient-name {
            font-size: 3.2rem;
            display: block;
            margin-bottom: 20px;
            color: #d63384;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        p {
            font-size: 1.3rem;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #555;
        }

        .heart-icon {
            font-size: 60px;
            color: #ff4d6d;
            animation: pulse 1.2s infinite;
            display: inline-block;
        }

        /* أنيميشن القلوب المتساقطة */
        .heart {
            position: absolute;
            top: -20px;
            color: #ff4d6d;
            font-size: 20px;
            user-select: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .signature {
            font-weight: bold;
            font-size: 1.2rem;
            color: #ff4d6d;
            margin-top: 25px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart-icon">❤️</div>
        <h1>إلى غاليتي</h1>
        <span class="recipient-name">بديعة</span>
        <p>
            شكراً لأنكِ في حياتي.. <br>
            أردتُ فقط أن أخبركِ كم أنا ممتن للقدر الذي جعل منكِ نصيبي. شكراً على حبكِ الصادق، حنانكِ، وجمال روحكِ الذي يجعل كل يوم معكِ عيداً. 
        </p>
        <span class="signature">أحبكِ دائماً وأبداً</span>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            // تنويع بين الرموز الرومانسية
            const icons = ['❤️', '💖', '✨', '🌸'];
            heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.opacity = Math.random() * 0.8 + 0.2;
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 350);
    </script>
</body>
</html>
