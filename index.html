<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NetProfite Pro | المزرعة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0f172a; --gold: #f59e0b; --green: #10b981; --sidebar: #1e293b; }
        
        body { 
            background: var(--blue); color: #fff; font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; touch-action: manipulation;
            height: 100vh; width: 100vw;
        }

        /* شاشة التسجيل - تظهر أولاً */
        #login-screen { 
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); 
            height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; 
            position: fixed; top: 0; left: 0; z-index: 9999; 
        }
        .login-card { 
            background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; 
            text-align: center; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* واجهة اللعبة - مخفية في البداية */
        #main-app { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; }

        .top-bar { 
            background: var(--sidebar); padding: 15px; display: flex; 
            justify-content: space-around; align-items: center; border-bottom: 2px solid var(--gold);
        }

        /* منطقة الزراعة */
        .farm-area { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative;
            background: linear-gradient(to bottom, #0f172a, #16213e);
        }

        /* التربة والنبات */
        .plot-circle {
            width: 200px; height: 200px; background: #3d2b1f;
            border: 5px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
            font-size: 80px; transition: 0.5s transform;
        }

        /* أزرار التحكم - مصممة للأندرويد */
        .mobile-nav {
            background: var(--sidebar); padding: 15px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            border-radius: 25px 25px 0 0;
        }
        .nav-item {
            background: rgba(255,255,255,0.05); padding: 15px 5px; border-radius: 15px;
            text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item.active { background: var(--gold); color: var(--blue); font-weight: 900; border: none; }
        .nav-item.disabled { opacity: 0.2; filter: grayscale(1); pointer-events: none; }

        .mute-toggle {
            position: absolute; top: 80px; left: 20px; background: rgba(0,0,0,0.5);
            width: 45px; height: 45px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 20px; border: 1px solid var(--gold);
        }

        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; 
            border: 2px solid #eee; background: #fff; font-family: 'Cairo'; font-weight: bold;
            box-sizing: border-box;
        }

        .btn-start {
            background: var(--gold); color: var(--blue); border: none; 
            padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; 
            font-size: 18px; cursor: pointer; margin-top: 10px;
        }

        #timer-text { font-size: 18px; margin-bottom: 20px; color: var(--gold); font-weight: 900; }
    </style>
</head>
<body>

<audio id="gameMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" type="audio/mpeg">
</audio>

<div id="login-screen">
    <div class="login-card">
        <h2 style="margin:0; color:var(--blue);">NET PROFITE FARM</h2>
        <p style="font-size:14px;">سجل وابدأ في جني الأرباح اليومية</p>
        <form onsubmit="return enterGame(event)">
            <input type="text" id="player-name" placeholder="أدخل اسمك الكامل" required>
            <select id="player-country">
                <option value="MA" data-curr="MAD">المغرب 🇲🇦</option>
                <option value="SA" data-curr="SAR">السعودية 🇸🇦</option>
                <option value="EG" data-curr="EGP">مصر 🇪🇬</option>
                <option value="DZ" data-curr="DZD">الجزائر 🇩🇿</option>
                <option value="AE" data-curr="AED">الإمارات 🇦🇪</option>
                <option value="IQ" data-curr="IQD">العراق 🇮🇶</option>
            </select>
            <button type="submit" class="btn-start">دخول المزرعة</button>
        </form>
    </div>
</div>

<div id="main-app">
    <div class="mute-toggle" onclick="toggleMusic()" id="vol-icon">🔊</div>

    <div class="top-bar">
        <div style="text-align:center"><small>الرصيد</small><br><b id="money">0.00</b> <span id="user-curr"></span></div>
        <div style="text-align:center"><small>الإحالات</small><br><b id="ref-code">--</b></div>
    </div>

    <div class="farm-area">
        <div id="timer-text">جاهز للزرع 🌱</div>
        <div class="plot-circle" id="plant-display">🕳️</div>
    </div>

    <div class="mobile-nav">
        <div id="m-seed" class="nav-item active" onclick="doPlant()">🌱<br>زرع</div>
        <div id="m-water" class="nav-item disabled" onclick="doWater()">💧<br>سقي</div>
        <div id="m-harvest" class="nav-item disabled" onclick="doHarvest()">💰<br>حصاد</div>
    </div>

    <div style="text-align:center; padding:15px; background:var(--sidebar); border-top:1px solid rgba(255,255,255,0.1);" onclick="alert('سيتم فتح السحب يوم السبت أو عند شحن باقة الذهب')">
        <b style="color:var(--gold)">🏦 سحب الأرباح</b>
    </div>
</div>

<script>
    let stage = 0; // 0: empty, 1: seeded, 2: growing
    let balance = 0;
    const music = document.getElementById('gameMusic');
    let muted = false;

    // دالة الدخول إلى اللعبة (إصلاح مشكلة التوجيه)
    function enterGame(e) {
        e.preventDefault();
        
        const sel = document.getElementById('player-country');
        const curr = sel.options[sel.selectedIndex].getAttribute('data-curr');
        
        document.getElementById('user-curr').innerText = curr;
        document.getElementById('ref-code').innerText = "NP-" + sel.value + "-" + Math.floor(1000 + Math.random()*9000);
        
        // إخفاء التسجيل وإظهار اللعبة فوراً
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        
        // تشغيل الموسيقى
        music.play().catch(() => console.log("Music blocked by browser"));
        
        return false;
    }

    function toggleMusic() {
        muted = !muted;
        music.muted = muted;
        document.getElementById('vol-icon').innerText = muted ? "🔇" : "🔊";
    }

    function doPlant() {
        if(stage !== 0) return;
        stage = 1;
        document.getElementById('plant-display').innerText = "🌱";
        updateGame("نمو.. سقي بعد 3 ساعات", "m-water", "m-seed");
    }

    function doWater() {
        if(stage === 1) {
            stage = 2;
            document.getElementById('plant-display').innerText = "🌳";
            document.getElementById('plant-display').style.transform = "scale(1.2)";
            updateGame("نضج! حصاد بعد 24 ساعة", "m-harvest", "m-water");
        }
    }

    function doHarvest() {
        if(stage === 2) {
            balance += 500;
            document.getElementById('money').innerText = balance.toFixed(2);
            alert("مبروك! حصدت 500 وحدة من عملتك.");
            resetGame();
        }
    }

    function updateGame(txt, activeId, disabledId) {
        document.getElementById('timer-text').innerText = txt;
        document.getElementById(activeId).className = "nav-item active";
        document.getElementById(disabledId).className = "nav-item disabled";
    }

    function resetGame() {
        stage = 0;
        document.getElementById('plant-display').innerText = "🕳️";
        document.getElementById('plant-display').style.transform = "scale(1)";
        document.getElementById('timer-text').innerText = "جاهز للزرع 🌱";
        document.getElementById('m-seed').className = "nav-item active";
        document.getElementById('m-water').className = "nav-item disabled";
        document.getElementById('m-harvest').className = "nav-item disabled";
    }
</script>

</body>
</html>
