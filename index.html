<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أميرة قلبي بديعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Reem+Kufi:wght@500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: radial-gradient(circle, #ffafbd, #ffc3a0);
            font-family: 'Cairo', sans-serif; overflow: hidden; color: #d63384;
        }

        /* شاشة البداية لتفعيل الصوت */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 1s;
        }

        .start-btn {
            background: #ff4d6d; color: white; border: none; padding: 15px 40px;
            border-radius: 50px; font-size: 1.5rem; font-family: 'Cairo';
            cursor: pointer; box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
        }

        /* حاوية الرسالة */
        .card {
            background: rgba(255, 255, 255, 0.95); padding: 45px; border-radius: 35px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1); text-align: center;
            max-width: 500px; width: 90%; z-index: 10; border: 3px solid #fff;
            display: none; animation: fadeIn 2.5s ease-out;
        }

        h1 { font-family: 'Reem Kufi', sans-serif; font-size: 2.8rem; margin-bottom: 15px; color: #ff4d6d; }
        .recipient-name { font-size: 3.2rem; display: block; margin-bottom: 20px; color: #d63384; }
        p { font-size: 1.3rem; line-height: 1.8; margin-bottom: 30px; color: #555; }
        .heart-icon { font-size: 60px; color: #ff4d6d; animation: pulse 1.2s infinite; display: inline-block; }

        .heart { position: absolute; top: -20px; color: #ff4d6d; user-select: none; z-index: 1; animation: fall linear forwards; }

        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .signature { font-weight: bold; font-size: 1.2rem; color: #ff4d6d; margin-top: 25px; display: block; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <button class="start-btn" onclick="startExperience()">اضغط هنا يا حبيبتي 💖</button>
        <p style="margin-top: 20px; font-size: 14px; color: #999;">تأكد من تشغيل الصوت</p>
    </div>

    <div class="card" id="loveCard">
        <div class="heart-icon">❤️</div>
        <h1>إلى غاليتي</h1>
        <span class="recipient-name">بديعة</span>
        <p>
            شكراً لأنكِ في حياتي.. <br>
            أردتُ فقط أن أخبركِ كم أنا ممتن للقدر الذي جعل منكِ نصيبي. شكراً على حبكِ الصادق، حنانكِ، وجمال روحكِ المصري الأصيل الذي يجعل كل يوم معكِ عيداً. 
        </p>
        <span class="signature">أحبكِ دائماً وأبداً</span>
    </div>

    <script>
        function startExperience() {
            // إخفاء الستارة وإظهار الكرت
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('loveCard').style.display = 'block';
                // تشغيل الموسيقى والقلوب
                document.getElementById('bgMusic').play();
                startHearts();
            }, 1000);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const icons = ['❤️', '💖', '✨', '🌸'];
            heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.opacity = Math.random() * 0.8 + 0.2;
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }

        function startHearts() {
            setInterval(createHeart, 350);
        }
    </script>
</body>
</html>
