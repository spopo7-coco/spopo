<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetProfite Farm | المزرعة السحرية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --land: #8d6e63; --sky: #81d4fa; --grass: #4caf50; --gold: #ffc107; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: #222; color: #fff; overflow: hidden; }

        /* شاشة التسجيل المحسنة */
        #login-screen { 
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            position: fixed; width: 100%; z-index: 9999;
        }
        .login-card { background: white; padding: 30px; border-radius: 25px; width: 340px; text-align: center; color: #333; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-weight: bold; }

        /* واجهة اللعبة */
        #main-app { display: none; height: 100vh; display: flex; flex-direction: column; background: var(--sky); }
        
        .header { background: rgba(0,0,0,0.2); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .balance-tag { background: var(--gold); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: 900; box-shadow: 0 4px 0 #b7950b; }

        /* المزرعة التفاعلية */
        .farm-view { flex-grow: 1; position: relative; overflow: hidden; background: linear-gradient(to bottom, #81d4fa 0%, #e1f5fe 100%); }
        .ground { position: absolute; bottom: 0; width: 100%; height: 30%; background: var(--land); border-top: 10px solid var(--grass); }
        
        /* النبتة المتحركة */
        .plant-container { position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); text-align: center; }
        .plant-img { width: 120px; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: bottom; }
        .wobble { animation: wobble 2s infinite; }
        @keyframes wobble { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }

        /* أزرار الأكشن السفلية */
        .actions { background: #fff; padding: 20px; display: flex; justify-content: space-around; border-radius: 30px 30px 0 0; }
        .action-btn { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 24px; transition: 0.2s; box-shadow: 0 5px 0 #ccc; }
        .action-btn:active { transform: translateY(5px); box-shadow: none; }
        .btn-seed { background: #8d6e63; color: white; }
        .btn-water { background: #03a9f4; color: white; }
        .btn-harvest { background: #4caf50; color: white; }
        .btn-locked { background: #eee; color: #aaa; cursor: not-allowed; box-shadow: none; }

        /* تأثيرات الربح */
        .coin-popup { position: absolute; color: var(--gold); font-weight: 900; font-size: 24px; animation: floatUp 1s forwards; pointer-events: none; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }

        #timer-text { font-weight: 900; color: #fff; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); font-size: 20px; }
    </style>
</head>
<body>

<audio id="sound-water"><source src="https://www.myinstants.com/media/sounds/water-pour.mp3" type="audio/mpeg"></audio>
<audio id="sound-coin"><source src="https://www.myinstants.com/media/sounds/coin-collect.mp3" type="audio/mpeg"></audio>
<audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>

<div id="login-screen">
    <div class="login-card">
        <h1 style="margin:0; color:#2ecc71;">NetProfite 🌾</h1>
        <p>المزرعة التي تجعلك ثرياً</p>
        <form onsubmit="event.preventDefault(); startApp();">
            <input type="text" id="p_name" placeholder="اسمك الكامل" required>
            <input type="email" placeholder="بريدك الإلكتروني" required>
            <select id="p_country">
                <option value="MA" data-curr="MAD">المغرب 🇲🇦</option>
                <option value="SA" data-curr="SAR">السعودية 🇸🇦</option>
                <option value="EG" data-curr="EGP">مصر 🇪🇬</option>
                <option value="DZ" data-curr="DZD">الجزائر 🇩🇿</option>
            </select>
            <button style="background:#4caf50; color:white; border:none; padding:15px; width:100%; border-radius:12px; font-weight:900; margin-top:10px; cursor:pointer;">تسجيل وابدأ الزرع</button>
        </form>
    </div>
</div>

<div id="main-app">
    <div class="header">
        <div id="timer-text">جاهز للزرع 🚜</div>
        <div class="balance-tag"><span id="balance">0.00</span> <span id="curr-sym">MAD</span></div>
    </div>

    <div class="farm-view">
        <div class="plant-container">
            <img id="plant-img" class="plant-img" src="https://cdn-icons-png.flaticon.com/512/628/628283.png" style="display:none">
            <div id="growth-per" style="font-weight:900; color:#2e7d32"></div>
        </div>
        <div class="ground"></div>
    </div>

    <div class="actions">
        <div style="text-align:center"><button id="btn-seed" class="action-btn btn-seed" onclick="plant()">🌱</button><small style="color:#333">زرع</small></div>
        <div style="text-align:center"><button id="btn-water" class="action-btn btn-locked" onclick="water()">💧</button><small style="color:#333">سقي</small></div>
        <div style="text-align:center"><button id="btn-harvest" class="action-btn btn-locked" onclick="harvest()">💰</button><small style="color:#333">حصاد</small></div>
    </div>
</div>

<script>
    let stage = 0; 
    let money = 0;
    let currency = "MAD";

    function startApp() {
        const sel = document.getElementById('p_country');
        currency = sel.options[sel.selectedIndex].getAttribute('data-curr');
        document.getElementById('curr-sym').innerText = currency;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('bg-music').play().catch(()=>{});
    }

    function plant() {
        if(stage !== 0) return;
        stage = 1;
        document.getElementById('sound-water').play();
        const img = document.getElementById('plant-img');
        img.src = "https://cdn-icons-png.flaticon.com/512/628/628283.png"; // بذرة
        img.style.display = "block";
        img.style.transform = "scale(0.5)";
        
        updateStatus("البذرة تنمو... سقي بعد 3 ساعات", "btn-water", "btn-seed");
        startTimer(10); // محاكاة لـ 10 ثواني للتجربة (غيرها لـ 10800 للواقعية)
    }

    function water() {
        if(stage === 1) {
            stage = 2;
            document.getElementById('sound-water').play();
            const img = document.getElementById('plant-img');
            img.src = "https://cdn-icons-png.flaticon.com/512/892/892926.png"; // نبتة صغيرة
            img.style.transform = "scale(0.8)";
            img.classList.add('wobble');
            updateStatus("النبتة تكبر! حصاد بعد 24 ساعة", "btn-harvest", "btn-water");
        }
    }

    function harvest() {
        if(stage === 2) {
            document.getElementById('sound-coin').play();
            showCoinPopup();
            money += 250;
            document.getElementById('balance').innerText = money.toFixed(2);
            alert("تم الحصاد بنجاح! ربحت " + 250 + " " + currency);
            reset();
        }
    }

    function updateStatus(txt, toEnable, toDisable) {
        document.getElementById('timer-text').innerText = txt;
        document.getElementById(toEnable).className = "action-btn " + toEnable.replace('btn-','btn-');
        document.getElementById(toDisable).className = "action-btn btn-locked";
    }

    function reset() {
        stage = 0;
        document.getElementById('plant-img').style.display = "none";
        document.getElementById('plant-img').classList.remove('wobble');
        updateStatus("جاهز للزرع 🚜", "btn-seed", "btn-harvest");
    }

    function showCoinPopup() {
        const p = document.createElement('div');
        p.className = 'coin-popup';
        p.innerText = "+250 " + currency;
        p.style.left = "50%"; p.style.top = "50%";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }

    function startTimer(sec
