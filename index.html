<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DopaBeauty | نظام الإحالات والاستثمار</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff85a2;
            --bg: #fcfcfc;
            --text: #333;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 90%; max-width: 500px;
            background: white; padding: 40px;
            border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 { color: var(--primary); font-weight: 900; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.6; }
        input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 12px;
            box-sizing: border-box; font-size: 16px; font-family: inherit;
        }
        input:focus { border-color: var(--primary); outline: none; }
        button {
            width: 100%; padding: 18px;
            background: var(--primary); color: white;
            border: none; border-radius: 12px;
            font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 18px;
        }
        button:hover { background: #ff6b8e; transform: scale(1.02); }
        
        #result {
            display: none; margin-top: 30px;
            padding: 20px; border: 2px dashed #48bb78;
            border-radius: 15px; background: #f0fff4;
        }
        .code-text {
            font-size: 28px; font-weight: 900; color: #2e7d32;
            display: block; margin: 15px 0; letter-spacing: 2px;
        }
        .loader { display: none; margin: 10px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>DOPA BEAUTY</h1>
        <p>انضم إلينا الآن! سجل بياناتك واحصل على كود إحالة فريد لبدء جني الأرباح من كل مستثمر جديد.</p>
        
        <form id="regForm">
            <input type="text" id="userName" placeholder="الاسم الكامل" required>
            <input type="email" id="userEmail" placeholder="البريد الإلكتروني" required>
            <input type="tel" id="userPhone" placeholder="رقم الواتساب" required>
            <input type="text" id="userCity" placeholder="المدينة" required>
            <button type="submit" id="submitBtn">توليد كود الإحالة</button>
            <div class="loader" id="loader"></div>
        </form>

        <div id="result">
            <h3 style="color:#2f855a; margin-top:0;">تهانينا! كودك جاهز:</h3>
            <span class="code-text" id="inviteCode">---</span>
            <p style="font-size: 14px; margin-bottom:0;">انسخ الكود وشاركه مع الآخرين. سيتم احتساب العمولات بناءً على هذا الكود.</p>
        </div>
    </div>
